name: GooglePlay dl

on:
  workflow_dispatch:
    inputs:
      app_input:
        description: 'Package name OR Google Play URL'
        required: true
        type: string
      architecture:
        description: 'Target Architecture'
        required: true
        type: choice
        default: 'arm64'
        options:
          - 'arm64'
          - 'armv7'

jobs:
  download-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@main
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/dl/
            !/apks/

      - name: Parse Input
        id: parse
        run: |
          RAW_INPUT="${{ github.event.inputs.app_input }}"
          if [[ "$RAW_INPUT" == *"id="* ]]; then
            PKG=$(echo "$RAW_INPUT" | grep -oP 'id=\K[^&]+')
          else
            PKG="$RAW_INPUT"
          fi
          PKG=$(echo "$PKG" | tr -d '[:space:]')
          echo "pkg=$PKG" >> $GITHUB_ENV
          echo "arch=${{ github.event.inputs.architecture }}" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jre-headless apksigner python3 python3-venv python3-pip curl git zip p7zip-full

      - name: Setup Google Play Downloader
        run: |
          git clone https://github.com/alltechdev/gplay-apk-downloader.git
          cd gplay-apk-downloader
          ./setup.sh

      - name: Fetch Token
        run: |
          cd gplay-apk-downloader
          echo "y" | ./gplay auth

      - name: Download APK from Google Play
        run: |
          mkdir -p temp_dl/${{ env.pkg }}
          cd gplay-apk-downloader
          ./gplay download ${{ env.pkg }} -a ${{ env.arch }} -o ../temp_dl/${{ env.pkg }}

      - name: Repackager
        run: |
          mkdir -p processed_dl
          cd temp_dl/${{ env.pkg }}
          
          APK_COUNT=$(ls -1 *.apk 2>/dev/null | wc -l)
          
          if [ "$APK_COUNT" -eq 0 ]; then
            exit 1
          elif [ "$APK_COUNT" -eq 1 ]; then
            mv *.apk "../../processed_dl/${{ env.pkg }}_${{ env.arch }}.apk"
          else
            zip -0 -q "../../processed_dl/${{ env.pkg }}_${{ env.arch }}.apks" *.apk
          fi

      - name: Zip & Split
        shell: bash
        run: |
          mkdir -p apks
          for FILE in processed_dl/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((95 * 1024 * 1024))
            BASENAME=$(basename "$FILE")
            
            rm -f "apks/${BASENAME}.zip"*
            
            if [ "$SIZE" -gt "$LIMIT" ]; then
              7z a -tzip -v95m "apks/${BASENAME}.zip" "$FILE"
              for ZPART in "apks/${BASENAME}".zip.00*; do
                [ -f "$ZPART" ] && basename "$ZPART" >> new_files.txt
              done
            else
              cp -f "$FILE" "apks/$BASENAME"
              echo "$BASENAME" >> new_files.txt
            fi
          done
          rm -rf temp_dl processed_dl gplay-apk-downloader

      - name: Update Links.md
        shell: bash
        run: |
          [ ! -f new_files.txt ] && exit 0
          
          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          HEADER="## 🔗 Direct Download Links\n> Click on any link below to start downloading directly.<br><br/>\n\n"
          
          echo "### 📅 $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M') IR" > current_run.md
          
          while IFS= read -r FNAME; do
            ENCODED_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote(input()))" <<< "$FNAME")
            RAW_URL="https://github.com/$REPO/raw/$BRANCH/apks/$ENCODED_NAME"
            
            export FNAME_ENV="$FNAME"
            SIZE_STR=$(python3 -c "import os; fname = os.environ.get('FNAME_ENV'); path = f'apks/{fname}'; size = os.path.getsize(path) if os.path.exists(path) else 0; print(f'{size/1048576:.1f}MB' if size >= 1048576 else f'{size//1024}KB')")
            
            EXT="${FNAME##*.}"
            case "$EXT" in
              apk|apks)        ICON="📱" ;;
              zip|00[1-9]*)    ICON="🗜️" ;;
              *)               ICON="📥" ;;
            esac
            
            echo "- $ICON [\`$FNAME\`]($RAW_URL) - **$SIZE_STR**" >> current_run.md
            echo "" >> current_run.md
          done < new_files.txt
          
          echo "---" >> current_run.md
          echo "" >> current_run.md
          
          if [ -f Links.md ]; then
            tail -n +4 Links.md > old_links.md 2>/dev/null || touch old_links.md
            echo -e "$HEADER" > Links.md
            cat current_run.md old_links.md >> Links.md
            rm old_links.md
          else
            echo -e "$HEADER" > Links.md
            cat current_run.md >> Links.md
          fi
          rm -f new_files.txt current_run.md


      - name: Push to Repository
        run: |
          git config user.name "NET-Sentinel Bot"
          git config user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          git add --sparse apks/ Links.md
          git -c committer.name="Diana-Cl" -c committer.email="135276904+Diana-Cl@users.noreply.github.com" commit -m "Added ${{ env.pkg }} (${{ env.arch }}) at: $(TZ='Asia/Tehran' date '+%H:%M:%S') [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF_NAME}
